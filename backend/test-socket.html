<!DOCTYPE html>
<html>
<head>
  <title>Socket Test</title>
</head>
<body>

<h1>IntellMeet Socket Test</h1>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
  const socket =
    io("http://localhost:5000");

  socket.on(
    "connect",
    () => {
      console.log(
        "Connected:",
        socket.id
      );

      socket.emit(
        "register-user",
        "test-user-123"
      );
    }
  );

  socket.on(
    "online-users",
    (users) => {
      console.log(
        "Online Users:",
        users
      );
    }
  );
</script>

</body>
</html>
